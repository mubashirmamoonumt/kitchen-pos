          type: integer
        menuItemId:
          type: ["integer", "null"]
        itemName:
          type: string
        itemPrice:
          type: string
        quantity:
          type: number
          format: float
        unit:
          type: string
        discountAmount:
          type: string
        subtotal:
          type: string
      required:
        - id
        - orderId
        - itemName
        - itemPrice
        - quantity
        - unit
        - discountAmount
        - subtotal

    Order:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        totalAmount:
          type: string
        discountAmount:
          type: string
        discountType:
          type: string
          enum: [pct, pkr]
        paymentMethod:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - totalAmount
        - discountAmount
        - discountType
        - createdAt
        - updatedAt

    OrderDetail:
      type: object
