        - available

    # REPORTS
    DailySalesSummaryItem:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: string
        orderCount:
          type: integer
        avgOrderValue:
          type: string
      required:
        - date
        - revenue
        - orderCount
        - avgOrderValue

    DailySalesReport:
      type: object
      properties:
        summary:
          type: array
          items:
            $ref: "#/components/schemas/DailySalesSummaryItem"
        totalRevenue:
