        id:
          type: integer
        recipeId:
          type: integer
        ingredientId:
          type: integer
        ingredientName:
          type: string
        ingredientNameUr:
          type: string
        unit:
          type: string
        recipeUnit:
          type: string
        quantity:
          type: string
      required:
        - id
        - recipeId
        - ingredientId
        - ingredientName
        - unit
        - recipeUnit
        - quantity

    RecipeDetail:
      type: object
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        menuItemName:
          type: string
        menuItemNameUr:
          type: string
        menuItemImageUrl:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredientDetail"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - menuItemId
        - menuItemName
        - ingredients
        - createdAt
        - updatedAt

    RecipeIngredientInput:
      type: object
      properties:
        ingredientId:
          type: integer
        quantity:
          type: string
        unit:
          type: string
      required:
        - ingredientId
        - quantity

    UpsertRecipeBody:
      type: object
      properties:
        instructions:
          type: ["string", "null"]
        ingredients:
          type: array
          items:
