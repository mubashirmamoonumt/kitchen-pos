        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        totalAmount:
          type: string
        discountAmount:
          type: string
        discountType:
