    # BILLS
    BillItem:
      type: object
      properties:
        id:
          type: integer
        billId:
          type: integer
        itemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: string
        subtotal:
          type: string
      required:
        - id
        - billId
        - itemName
        - quantity
        - unitPrice
        - subtotal

    BillSummary:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        totalAmount:
          type: string
        paymentMethod:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - totalAmount
        - paymentMethod
        - createdAt

    BillDetail:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        totalAmount:
          type: string
        paymentMethod:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
