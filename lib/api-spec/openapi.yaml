        unit:
          type: string
        stockQuantity:
          type: string
        lowStockThreshold:
          type: string
        isLowStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - unit
        - stockQuantity
        - lowStockThreshold
        - isLowStock
        - createdAt
        - updatedAt

    CreateIngredientBody:
      type: object
      properties:
        name:
          type: string
        nameUr:
          type: string
        unit:
          type: string
        stockQuantity:
          type: string
        lowStockThreshold:
          type: string
      required:
