        id:
          type: integer
        ingredientId:
          type: integer
        ingredientName:
          type: string
        quantityBefore:
          type: string
        quantityAfter:
          type: string
        change:
          type: string
        reason:
          type: ["string", "null"]
        billId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ingredientId
        - ingredientName
        - quantityBefore
        - quantityAfter
        - change
        - createdAt

    # RECIPES
    RecipeIngredientDetail:
      type: object
