        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
        convertedOrderId:
          type: ["integer", "null"]
        items:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/ScheduledOrderItem"
