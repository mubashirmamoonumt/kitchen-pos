      required:
        - id
        - status
        - totalAmount
        - discountAmount
        - discountType
        - createdAt
        - updatedAt
        - items

    CreateOrderItemInput:
      type: object
      properties:
        menuItemId:
          type: integer
        itemName:
          type: string
        itemPrice:
          type: string
        quantity:
          type: number
          format: float
        unit:
          type: string
        discountAmount:
          type: string
      required:
        - menuItemId
        - itemName
        - itemPrice
        - quantity

    CreateOrderBody:
      type: object
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        notes:
          type: string
        paymentMethod:
          type: string
        discountAmount:
          type: string
        discountType:
          type: string
          enum: [pct, pkr]
        items:
          type: array
